spring:
  # ========== 数据源配置 ==========
  datasource:
    url: jdbc:mysql://localhost:3306/test?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    # ↑ 数据库地址：localhost本机，3306端口，cinematics数据库名
    username: root                    # MySQL用户名
    password: 123qweasd!                  # ⚠️ 改成你自己的MySQL密码
    driver-class-name: com.mysql.cj.jdbc.Driver  # MySQL驱动

  # ========== JPA（ORM框架）配置 ==========
  jpa:
    hibernate:
      ddl-auto: update    # 自动建表/更新表结构（开发时用update）
    show-sql: true        # 控制台打印SQL语句（方便调试）
    properties:
      hibernate:
        format_sql: true  # SQL格式化输出（更易读）
        dialect: org.hibernate.dialect.MySQLDialect
